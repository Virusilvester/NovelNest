name: Sync Release to Web

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to sync (e.g. v0.1.0-beta.1)"
        required: true
      prerelease:
        description: "Is this a pre-release?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  sync-to-web:
    name: Download APK and push to novelnest-web
    runs-on: ubuntu-latest

    steps:
      # ── Resolve variables from either trigger ─────────────────────────────────
      - name: Set release variables
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
            echo "prerelease=${{ github.event.inputs.prerelease }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
            echo "prerelease=${{ github.event.release.prerelease }}" >> $GITHUB_OUTPUT
          fi

      # ── Wait for APK asset to finish uploading ────────────────────────────────
      # The release is published before the APK asset finishes uploading.
      # Poll the API until the .apk asset appears (up to 5 minutes).
      - name: Wait for APK asset and get download URL
        id: asset
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          MAX_ATTEMPTS=30
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS — checking for APK asset..."

            RELEASE=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}")

            APK_URL=$(echo "$RELEASE" | jq -r '.assets[] | select(.name | endswith(".apk")) | .url // empty')
            PUBLISHED=$(echo "$RELEASE" | jq -r '.published_at')
            NOTES=$(echo "$RELEASE" | jq -r '.name')

            if [ -n "$APK_URL" ]; then
              echo "Found APK asset: $APK_URL"
              echo "apk_url=$APK_URL" >> $GITHUB_OUTPUT
              echo "published=$PUBLISHED" >> $GITHUB_OUTPUT
              echo "notes=$NOTES" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "APK not ready yet, waiting 10s..."
            sleep 10
          done

          echo "ERROR: APK asset not found after $MAX_ATTEMPTS attempts"
          exit 1

      # ── Download the APK using the API asset URL (works for private repos) ────
      # Use .url (API endpoint) not .browser_download_url — private repos need
      # the Accept: application/octet-stream header on the API URL directly.
      - name: Download release APK
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          curl -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "${{ steps.asset.outputs.apk_url }}" \
            -o "NovelNest-${TAG}.apk"

          # Verify the file was actually downloaded and is not empty/an error page
          FILE_SIZE=$(stat -c%s "NovelNest-${TAG}.apk")
          echo "Downloaded file size: ${FILE_SIZE} bytes"
          if [ "$FILE_SIZE" -lt 10000 ]; then
            echo "ERROR: Downloaded file is too small — likely an auth error"
            cat "NovelNest-${TAG}.apk"
            exit 1
          fi

      # ── Checkout novelnest-web ────────────────────────────────────────────────
      - name: Checkout novelnest-web
        uses: actions/checkout@v4
        with:
          repository: virusilvester/novelnest-web
          token: ${{ secrets.WEB_REPO_PAT }}
          path: web

      # ── Copy APK into novelnest-web/releases/ ─────────────────────────────────
      - name: Copy APK to web repo
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          mkdir -p web/releases
          cp "NovelNest-${TAG}.apk" web/releases/
          echo "Copied APK:"
          ls -lh web/releases/

      # ── Update releases.json manifest ────────────────────────────────────────
      - name: Update releases.json
        run: |
          cd web

          if [ -f releases.json ]; then
            EXISTING=$(cat releases.json)
          else
            EXISTING="[]"
          fi

          VERSION="${{ steps.vars.outputs.tag }}"
          IS_PRERELEASE=${{ steps.vars.outputs.prerelease }}
          APK_FILENAME="NovelNest-${VERSION}.apk"

          NEW_ENTRY=$(jq -n \
            --arg version "$VERSION" \
            --arg apk "releases/$APK_FILENAME" \
            --argjson prerelease "$IS_PRERELEASE" \
            --arg published "${{ steps.asset.outputs.published }}" \
            --arg notes "${{ steps.asset.outputs.notes }}" \
            '{version: $version, apk: $apk, prerelease: $prerelease, published: $published, notes: $notes}')

          FILTERED=$(echo "$EXISTING" | jq --arg v "$VERSION" '[.[] | select(.version != $v)]')
          echo "$FILTERED" | jq --argjson entry "$NEW_ENTRY" '[$entry] + .' > releases.json

          echo "Updated releases.json:"
          cat releases.json

      # ── Commit and push to novelnest-web ─────────────────────────────────────
      - name: Commit and push
        run: |
          cd web
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add releases/ releases.json
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "release: add NovelNest ${{ steps.vars.outputs.tag }}"
          git push
