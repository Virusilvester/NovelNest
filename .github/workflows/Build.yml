name: Build Android APK

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type (debug or release)"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java ─────────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # ── Node ─────────────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── Dependencies ─────────────────────────────────────────────────────────
      - name: Install Node dependencies
        run: npm install

      # ── Expo prebuild (generates the android/ folder) ────────────────────────
      - name: Run Expo prebuild
        run: npx expo prebuild --platform android --no-install

      # ── Android SDK ──────────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── Gradle cache ─────────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── Keystore (release only) ───────────────────────────────────────────────
      - name: Decode keystore
        if: github.event.inputs.build_type == 'release' || github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      # ── Build: Debug ──────────────────────────────────────────────────────────
      - name: Build Debug APK
        if: github.event.inputs.build_type != 'release' && github.ref != 'refs/heads/main'
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      # ── Build: Release ────────────────────────────────────────────────────────
      - name: Build Release APK
        if: github.event.inputs.build_type == 'release' || github.ref == 'refs/heads/main'
        working-directory: android
        env:
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      # ── Upload APK artifact ───────────────────────────────────────────────────
      - name: Upload Debug APK
        if: github.event.inputs.build_type != 'release' && github.ref != 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Upload Release APK
        if: github.event.inputs.build_type == 'release' || github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      # ── Rename APK with version tag ───────────────────────────────────────────
      - name: Rename APK for release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/NovelNest-${VERSION}.apk

      # ── Create GitHub Release ─────────────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "NovelNest ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          body: |
            ## 📦 NovelNest ${{ github.ref_name }}

            ### Installation
            1. Download the APK below
            2. On your Android device, enable **Install from unknown sources**
               (`Settings → Apps → Special app access → Install unknown apps`)
            3. Open the downloaded APK and install

            ### Changes
            ${{ github.event.head_commit.message }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          files: android/app/build/outputs/apk/release/NovelNest-${{ github.ref_name }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
